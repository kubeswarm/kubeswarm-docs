name: Freeze Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to freeze (e.g. v0.3.0)"
        required: true

concurrency:
  group: docs-version
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Freeze docs version
        run: npx docusaurus docs:version "${{ inputs.version }}"

      - name: Update docusaurus.config.ts
        run: |
          version="${{ inputs.version }}"

          # Set lastVersion to the newly frozen version
          sed -i "s/lastVersion: '.*'/lastVersion: '${version}'/" docusaurus.config.ts

          # Add version entry with label if not already present
          if ! grep -q "'${version}'" docusaurus.config.ts; then
            sed -i "/versions:/a\\
                '${version}': { label: '${version}' }," docusaurus.config.ts
          fi

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ inputs.version }}"
          branch="auto/version-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add -A
          git commit -m "docs: freeze version ${version}"
          git push --force origin "$branch"
          gh pr create \
            --title "docs: freeze version ${version}" \
            --body "Freeze docs for release \`${version}\`." \
            --head "$branch"
